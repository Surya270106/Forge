name: Forge CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v3
    - name: Set up Python
      run: uv python install 3.12
    - name: Install dependencies
      run: uv pip install -r pyproject.toml
    - name: Run tests
      run: uv run pytest tests/
    - name: Run linters
      run: |
        uv run ruff check .
        uv run pyright .

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./apps/frontend
      run: npm ci
    - name: Build frontend
      working-directory: ./apps/frontend
      run: npm run build
    - name: Lint frontend
      working-directory: ./apps/frontend
      run: npm run lint
